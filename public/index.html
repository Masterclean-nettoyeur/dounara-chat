<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DouNara</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body{
  background:white;
  color:#58071a;
  font-family:Arial;
  display:flex;
  justify-content:center;
}
.app{
  width:100%;
  max-width:420px;
  height:100vh;
  display:flex;
  flex-direction:column;
}
header{
  background:#58071a;
  color:white;
  padding:10px;
  text-align:center;
}
#messages{flex:1;overflow:auto;padding:10px;}
input,button{padding:10px;margin:5px;}
video{width:100%;border-radius:10px;}
.call-btn{background:#58071a;color:white;}
</style>
</head>

<body>
<div class="app">
<header>DouNara 💚</header>

<div id="messages"></div>

<input id="msg" placeholder="Message...">
<button onclick="send()">Envoyer</button>

<button class="call-btn" onclick="startCall()">📹 Appeler</button>

<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

<script>
const socket = io();
let localStream;
let peer;

const config = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

socket.on("history", msgs=>{
  msgs.forEach(m=>add(m.user+" : "+m.text));
});

function send(){
  const data={user:"Moi",text:msg.value};
  socket.emit("message",data);
  add("Moi : "+msg.value);
  msg.value="";
}

socket.on("message", data=>{
  add("Lui : "+data.text);
});

function add(t){
  let d=document.createElement("div");
  d.textContent=t;
  messages.appendChild(d);
}

// 🎥 démarrer appel
async function startCall(){
  localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  localVideo.srcObject=localStream;

  peer = new RTCPeerConnection(config);
  localStream.getTracks().forEach(track=>peer.addTrack(track,localStream));

  peer.onicecandidate = e=>{
    if(e.candidate) socket.emit("ice-candidate", e.candidate);
  };

  peer.ontrack = e=>{
    remoteVideo.srcObject = e.streams[0];
  };

  const offer = await peer.createOffer();
  await peer.setLocalDescription(offer);
  socket.emit("call-user", offer);
}

// 📞 appel entrant (aperçu AVANT décrocher)
socket.on("incoming-call", async (offer)=>{
  localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  localVideo.srcObject=localStream;

  peer = new RTCPeerConnection(config);
  localStream.getTracks().forEach(track=>peer.addTrack(track,localStream));

  peer.ontrack = e=>{
    remoteVideo.srcObject = e.streams[0];
  };

  peer.onicecandidate = e=>{
    if(e.candidate) socket.emit("ice-candidate", e.candidate);
  };

  await peer.setRemoteDescription(offer);
  const answer = await peer.createAnswer();
  await peer.setLocalDescription(answer);
  socket.emit("answer-call", answer);
});

socket.on("call-answered", async (answer)=>{
  await peer.setRemoteDescription(answer);
});

socket.on("ice-candidate", async (candidate)=>{
  await peer.addIceCandidate(candidate);
});
</script>
</body>
</html>
